<div class="page-container">
  <div class="page-header">
    <h1>Products</h1>
    <div class="actions">
      <a mat-flat-button color="primary" routerLink="/catalog/products/create">
        <mat-icon>add</mat-icon> New product
      </a>
      <button mat-stroked-button (click)="load()">
        <mat-icon>refresh</mat-icon> Refresh
      </button>
    </div>
  </div>

  @if (loading()) {
    <app-loading-spinner message="Loading products…" />
  } @else if (error(); as err) {
    <app-error-message [message]="err" />
  } @else if (!hasProducts()) {
    <app-empty-state
      icon="inventory_2"
      title="No products yet"
      message="Create the first product in the catalog to get started.">
      <a mat-flat-button color="primary" routerLink="/catalog/products/create" class="mt-2">
        <mat-icon>add</mat-icon> New product
      </a>
    </app-empty-state>
  } @else {
    <mat-card appearance="outlined">
      <table mat-table [dataSource]="products()" class="full-width">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let p">
            <div class="product-name">
              <strong>{{ p.name }}</strong>
              <span class="muted">{{ p.description }}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let p">
            @for (c of p.category; track c) {
              <mat-chip-set><mat-chip>{{ c }}</mat-chip></mat-chip-set>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef>Price</th>
          <td mat-cell *matCellDef="let p">{{ p.price | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
          <td mat-cell *matCellDef="let p" class="actions-col">
            <div class="row-actions">
              <a mat-icon-button [routerLink]="['/catalog/products', p.id]" title="Details">
                <mat-icon>visibility</mat-icon>
              </a>
              <a mat-icon-button [routerLink]="['/catalog/products', p.id, 'edit']" title="Edit">
                <mat-icon>edit</mat-icon>
              </a>
              <button mat-icon-button color="warn" (click)="onDelete(p)" title="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  }
</div>
