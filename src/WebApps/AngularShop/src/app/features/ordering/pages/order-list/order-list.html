<div class="page-container">
  <div class="page-header">
    <h1>Orders</h1>
    <div class="actions">
      <a mat-stroked-button routerLink="/ordering/orders/find-by-name">
        <mat-icon>search</mat-icon> Find by name
      </a>
      <a mat-flat-button color="primary" routerLink="/ordering/orders/create">
        <mat-icon>add</mat-icon> New order
      </a>
      <button mat-stroked-button (click)="load()">
        <mat-icon>refresh</mat-icon> Refresh
      </button>
    </div>
  </div>

  @if (loading()) {
    <app-loading-spinner message="Loading orders…" />
  } @else if (error(); as err) {
    <app-error-message [message]="err" />
  } @else if (!hasOrders()) {
    <app-empty-state icon="receipt_long" title="No orders yet"
                     message="Create the first order or check out a basket.">
      <a mat-flat-button color="primary" routerLink="/ordering/orders/create" style="margin-top:16px">
        <mat-icon>add</mat-icon> New order
      </a>
    </app-empty-state>
  } @else {
    <mat-card appearance="outlined">
      <table mat-table [dataSource]="orders()">
        <ng-container matColumnDef="orderName">
          <th mat-header-cell *matHeaderCellDef>Order name</th>
          <td mat-cell *matCellDef="let o"><strong>{{ o.orderName }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let o">
            <mat-chip-set><mat-chip class="status">{{ statusLabel[o.status] }}</mat-chip></mat-chip-set>
          </td>
        </ng-container>
        <ng-container matColumnDef="items">
          <th mat-header-cell *matHeaderCellDef>Items</th>
          <td mat-cell *matCellDef="let o">{{ o.orderItems?.length || 0 }}</td>
        </ng-container>
        <ng-container matColumnDef="customer">
          <th mat-header-cell *matHeaderCellDef>Customer</th>
          <td mat-cell *matCellDef="let o"><code>{{ o.customerId }}</code></td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
          <td mat-cell *matCellDef="let o" class="actions-col">
            <div class="row-actions">
              <button mat-icon-button (click)="viewOrder(o)" title="Details">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button (click)="editOrder(o)" title="Edit">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteOrder(o)" title="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      <mat-paginator
        [length]="total()"
        [pageIndex]="pageIndex()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="[5, 10, 25, 50]"
        (page)="onPage($event)" />
    </mat-card>
  }
</div>
