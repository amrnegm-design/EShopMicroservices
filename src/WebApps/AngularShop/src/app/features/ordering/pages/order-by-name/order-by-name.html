<div class="page-container">
  <div class="page-header">
    <h1>Find orders by name</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="search()">
    <mat-form-field appearance="outline">
      <mat-label>Order name</mat-label>
      <input matInput formControlName="name" placeholder="Order_1">
    </mat-form-field>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading()">
      <mat-icon>search</mat-icon> Search
    </button>
  </form>

  @if (loading()) {
    <app-loading-spinner />
  } @else if (error(); as err) {
    <app-error-message [message]="err" />
  } @else if (searched() && !hasResults()) {
    <app-empty-state icon="receipt_long" title="No orders" message="No orders match that name." />
  } @else if (hasResults()) {
    <mat-card appearance="outlined">
      <table mat-table [dataSource]="orders()">
        <ng-container matColumnDef="orderName">
          <th mat-header-cell *matHeaderCellDef>Order name</th>
          <td mat-cell *matCellDef="let o"><strong>{{ o.orderName }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let o">
            <mat-chip-set><mat-chip>{{ statusLabel[o.status] }}</mat-chip></mat-chip-set>
          </td>
        </ng-container>
        <ng-container matColumnDef="items">
          <th mat-header-cell *matHeaderCellDef>Items</th>
          <td mat-cell *matCellDef="let o">{{ o.orderItems?.length || 0 }}</td>
        </ng-container>
        <ng-container matColumnDef="view">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let o">
            <button mat-icon-button (click)="viewOrder(o)" title="View">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  }
</div>
