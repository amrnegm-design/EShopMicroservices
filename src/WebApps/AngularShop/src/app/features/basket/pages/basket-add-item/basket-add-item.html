<div class="page-container">
  <div class="page-header">
    <h1>Add to basket</h1>
  </div>

  @if (loadingProducts()) {
    <app-loading-spinner message="Loading products…" />
  } @else if (error(); as err) {
    <app-error-message [message]="err" />
  } @else {
    <mat-card appearance="outlined" class="form-card">
      <p>Adding for <strong>{{ userName() }}</strong></p>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Product</mat-label>
          <mat-select formControlName="productId">
            @for (p of products(); track p.id) {
              <mat-option [value]="p.id">{{ p.name }} — {{ p.price | currency }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" min="1" formControlName="quantity">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Color</mat-label>
            <input matInput formControlName="color">
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/basket" [disabled]="submitting()">Cancel</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting()">
            <mat-icon>add_shopping_cart</mat-icon>
            {{ submitting() ? 'Adding…' : 'Add to basket' }}
          </button>
        </div>
      </form>
    </mat-card>
  }
</div>
