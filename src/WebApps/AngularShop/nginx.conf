server {
    listen       80;
    server_name  _;
    sendfile     on;

    # Static SPA assets
    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip               on;
    gzip_min_length    1024;
    gzip_types         text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary          on;

    # Reverse-proxy API calls to the YARP gateway (same Docker network).
    # The gateway already maps /catalog-service /basket-service /ordering-service to the
    # right upstream services, so we just forward the path unchanged.
    location ~ ^/(catalog-service|basket-service|ordering-service)/ {
        proxy_pass         http://yarpapigateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Angular client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed bundles aggressively
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
